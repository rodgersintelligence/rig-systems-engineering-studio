name: Generate lattice + verify

on:
  push:
    branches: [main]
    paths:
      - "lattice/**"
      - "cards-design/**"
      - "tests/**"
      - ".github/workflows/generate-lattice.yml"
  pull_request:
    paths:
      - "lattice/**"
      - "cards-design/**"
      - "tests/**"
      - ".github/workflows/generate-lattice.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[viz,yaml,dev]"

      - name: Validate generator (in-memory)
        run: python -m lattice.generator --validate

      - name: Generate all 588 cards
        run: python -m lattice.generator

      - name: Assert card count (588 = 7×3×4×7 corrected geometry)
        run: |
          count=$(ls lattice/cards/*.yaml | wc -l)
          if [ "$count" -ne 588 ]; then
            echo "::error::Expected 588 YAML cards, found $count"
            exit 1
          fi
          echo "✅ 588 cards generated"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=line

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lattice-cards
          path: |
            lattice/cards/
            viz/lattice_index.json
          retention-days: 30
